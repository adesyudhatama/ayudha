<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokumen Capaian JDIH Kabupaten OKI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff7fb;
        background: #08060b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 79, 163, 0.22), transparent 32%),
          radial-gradient(circle at 82% 24%, rgba(141, 243, 229, 0.16), transparent 30%),
          #08060b;
      }

      main {
        width: min(760px, 100%);
        padding: clamp(24px, 5vw, 42px);
        border: 1px solid rgba(255, 231, 246, 0.18);
        border-radius: 32px;
        background: rgba(18, 16, 24, 0.82);
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.34);
      }

      p {
        color: #d8c7d3;
        line-height: 1.7;
      }

      .eyebrow {
        color: #ffd166;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 3.6rem);
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Dokumen Capaian Kinerja</p>
      <h1>JDIH Kabupaten OKI Terbaik Se-Sumatera Selatan</h1>
      <p>
        Dokumen ini menjadi tautan pendukung untuk capaian kinerja JDIH
        Kabupaten OKI. Silakan ganti file ini dengan dokumen resmi apabila
        tautan final, PDF, atau berkas publikasi penghargaan sudah tersedia.
      </p>
    </main>
  </body>
</html>
